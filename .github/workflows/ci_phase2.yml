      # ── STEP 11 : Upload artifacts ────────────────────────────────────────
      - name: "Upload — LLM inputs"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: llm-inputs
          path: |
            ai_inputs/git_diff.txt
            ai_inputs/test_history.txt
            ai_inputs/dependencies.json
            ai_inputs/selected_tests.json

      - name: "Upload — AI test report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-test-report
          path: reports_ai/