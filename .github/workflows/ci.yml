name: CI Pipeline — ur-simulation (Classique + IA)

# ══════════════════════════════════════════════════════════════════════════════
#
#  DEUX jobs INDÉPENDANTS qui tournent EN PARALLÈLE à chaque git push :
#
#  JOB 1 — tests-classiques  (approche SANS IA)
#    - Build Docker → lance les 106 tests → récupère reports/
#    - Extrait les vrais résultats PASSED/FAILED depuis le rapport pytest
#    - Ajoute ces résultats dans test_history_store.json
#    - Commite le store  →  il sera disponible pour le JOB 2 du PROCHAIN push
#
#  JOB 2 — tests-ia  (approche AVEC IA)
#    - Checkout → test_history_store.json est déjà dans le dépôt (push précédent)
#    - prepare_inputs.py lit ce store réel → construit tests_history.txt
#    - Envoie les 3 fichiers ai_inputs/ à DeepSeek
#    - Lance uniquement les tests sélectionnés par le LLM
#
#  Les deux jobs sont INDÉPENDANTS et PARALLÈLES.
#  Ils représentent deux approches comparées, pas deux étapes d une même chaîne.
#
#  Flux du store (mémoire historique réelle) :
#
#    Push N-1 : JOB 1 → vrais résultats → commite store dans le dépôt
#                                                  ↓
#    Push N   : JOB 2 → checkout → lit store (push N-1) → tests_history.txt → LLM
#               JOB 1 → vrais résultats → commite store mis à jour (pour push N+1)
#
#  Le store a un push de retard — c est normal et suffisant.
#  Le LLM raisonne sur l historique passé, pas sur le commit en cours.
#
# ══════════════════════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — PIPELINE CLASSIQUE (sans IA)
  # - Lance les 106 tests
  # - Alimente test_history_store.json avec les vrais résultats
  # - Commite le store pour que le JOB 2 du prochain push en bénéficie
  # ────────────────────────────────────────────────────────────────────────────
  tests-classiques:
    name: "JOB 1 — Tests Complets Sans IA"
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: "Build image Docker"
        run: docker build -t ur-simulation .

      - name: "Lancer TOUS les tests (106) dans Docker"
        run: docker run --name ur-test-classic ur-simulation
        continue-on-error: true

      - name: "Récupérer le dossier reports/ depuis Docker"
        if: always()
        run: docker cp ur-test-classic:/app/reports/. reports/

      # ── Alimenter test_history_store.json avec les vrais résultats ────────
      # On lit le rapport pytest HTML pour extraire les vrais PASSED/FAILED.
      # Ces résultats sont ajoutés au store persistant commité dans le dépôt.
      # Ce store sera lu par le JOB 2 du prochain push pour construire
      # tests_history.txt avec de vraies données historiques.
      - name: "Alimenter test_history_store.json avec les vrais résultats"
        if: always()
        run: |
          python3 - <<'EOF'
          import json, re, os, glob, subprocess

          # Lire le rapport pytest HTML
          passed, failed, errors = [], [], []
          html_files = glob.glob("reports/report*.html")
          for html_path in html_files:
              with open(html_path, encoding="utf-8", errors="replace") as f:
                  content = f.read()
              names    = re.findall(r'<td class="col-name"[^>]*>(.*?)</td>', content)
              statuses = re.findall(r'<td class="col-result">(.*?)</td>', content)
              for name, status in zip(names, statuses):
                  name   = re.sub(r'<[^>]+>', '', name).strip()
                  status = status.strip().lower()
                  if   status == "passed": passed.append(name)
                  elif status == "failed": failed.append(name)
                  elif status == "error":  errors.append(name)
              break

          print(f"Résultats lus : {len(passed)} passed, {len(failed)} failed")

          # Infos du commit courant
          def git(cmd):
              return subprocess.run(cmd, shell=True, capture_output=True, text=True).stdout.strip()

          commit_hash = git("git rev-parse --short HEAD")
          commit_date = git("git log -1 --format=%ai")[:10]
          commit_msg  = git("git log -1 --format=%s")

          def normalize(name):
              if "::" in name:
                  name = name.split("::")[-1]
              m = re.search(r'(test_\w+)', name)
              return m.group(1) if m else name.strip()

          # Charger le store existant
          os.makedirs("ai_inputs", exist_ok=True)
          store_path = "ai_inputs/test_history_store.json"
          store = {}
          if os.path.exists(store_path):
              with open(store_path) as f:
                  store = json.load(f)

          # Ajouter les nouvelles entrées réelles
          new_entries = 0
          for name in passed + failed + errors:
              test_id = normalize(name)
              result  = "PASSED" if name in passed else ("FAILED" if name in failed else "ERROR")
              key     = f"{commit_hash}::{test_id}"
              if key not in store:
                  store[key] = {
                      "commit_hash":    commit_hash,
                      "commit_date":    commit_date,
                      "commit_message": commit_msg,
                      "test_id":        test_id,
                      "result":         result,
                  }
                  new_entries += 1

          with open(store_path, "w") as f:
              json.dump(store, f, indent=2)

          print(f"Store : {len(store)} entrées totales, +{new_entries} nouvelles")
          print(f"Commit : {commit_hash} | {commit_date} | {commit_msg}")
          EOF

      # ── Commiter le store dans le dépôt ───────────────────────────────────
      # Ce commit rend le store disponible pour le JOB 2 du PROCHAIN push.
      - name: "Commiter test_history_store.json"
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai_inputs/test_history_store.json
          git diff --staged --quiet \
            && echo "Aucune nouvelle entrée — rien à commiter." \
            || (git commit -m "ci: update test_history_store [skip ci]" && git push)

      - name: "DIAGNOSTIC — simulation_results.json"
        if: always()
        run: cat reports/simulation_results.json || echo "(absent)"

      - name: "DIAGNOSTIC — Webots stderr"
        if: always()
        run: tail -20 reports/webots_stderr.log || echo "(absent)"

      - name: "DIAGNOSTIC — Webots stdout"
        if: always()
        run: tail -20 reports/webots_stdout.log || echo "(absent)"

      - name: "Upload artefacts — pipeline classique (reports/)"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: resultats-classique
          path: reports/


  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — PIPELINE IA (indépendant du JOB 1)
  # - Lit test_history_store.json déjà présent dans le dépôt (commité au push N-1)
  # - Génère les 3 fichiers ai_inputs/ avec de vraies données historiques
  # - Appelle DeepSeek pour sélectionner et prioriser les tests
  # - Lance uniquement les tests sélectionnés
  # ────────────────────────────────────────────────────────────────────────────
  tests-ia:
    name: "JOB 2 — Tests Sélectionnés par IA (DeepSeek)"
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pytest pytest-html

      # ── Générer les 3 fichiers d input pour le LLM ───────────────────────
      # prepare_inputs.py lit test_history_store.json (déjà dans le dépôt)
      # qui contient les vrais résultats des commits précédents.
      # Il construit tests_history.txt avec ces vraies données.
      - name: "Générer les fichiers ai_inputs/ (prepare_inputs.py)"
        run: python prepare_inputs.py

      # ── Sélection par le LLM ──────────────────────────────────────────────
      - name: "Sélection IA — DeepSeek (dry-run)"
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python ai_test_selector.py --skip-prepare --dry-run --verbose

      - name: "Afficher la sélection produite par le LLM"
        run: |
          python3 -c "
          import json
          with open('ai_inputs/last_selection.json') as f:
              s = json.load(f)
          print(f\"Modele    : {s['model']}\")
          print(f\"Diff      : {s.get('diff_summary', '')}\")
          print(f\"Selection : {len(s['selected'])} tests choisis, {s['skipped']} ignores\n\")
          for t in s['selected']:
              print(f\"  [{t['priority']:>2}] {t['test_id']:<50}  {t.get('reason','')[:60]}\")
          "

      # ── Préparer les chemins de fichiers pytest ───────────────────────────
      - name: "Préparer la liste des tests sélectionnés"
        run: |
          python3 - <<'EOF'
          import json
          from pathlib import Path

          with open("ai_inputs/last_selection.json") as f:
              sel = json.load(f)

          test_dir = Path("tests")
          paths, not_found = [], []
          for entry in sel["selected"]:
              tid     = entry["test_id"]
              matches = list(test_dir.rglob(f"{tid}.py"))
              if matches:
                  paths.append(str(matches[0]))
              else:
                  not_found.append(tid)

          if not_found:
              print(f"Tests introuvables (ignores) : {not_found}")

          with open("ai_inputs/selected_test_paths.txt", "w") as f:
              f.write(" ".join(paths))

          print(f"{len(paths)} chemins prepares :")
          for p in paths:
              print(f"  {p}")
          EOF

      # ── Lancer uniquement les tests sélectionnés dans Docker ──────────────
      - name: "Build image Docker"
        run: docker build -t ur-simulation .

      - name: "Lancer les tests IA sélectionnés dans Docker"
        run: |
          SELECTED_PATHS=$(cat ai_inputs/selected_test_paths.txt)
          echo "Tests a lancer : $SELECTED_PATHS"
          docker run --name ur-test-ia ur-simulation bash -c "
            export DISPLAY=:99
            Xvfb :99 -screen 0 1280x1024x24 -ac +extension GLX +render -noreset &
            sleep 3
            webots --mode=fast --batch --no-rendering worlds/ure.wbt \
                1>/app/reports/webots_stdout_ia.log \
                2>/app/reports/webots_stderr_ia.log &
            WEBOTS_PID=\$!
            WAITED=0
            while [ \$WAITED -lt 270 ]; do
              sleep 5; WAITED=\$((WAITED + 5))
              if [ -f /app/reports/simulation_results.json ]; then
                DONE=\$(python3 -c \"import json; d=json.load(open('/app/reports/simulation_results.json')); print(d.get('sequence_complete',False))\" 2>/dev/null)
                echo \"[\${WAITED}s] sequence_complete=\${DONE}\"
                [ \"\$DONE\" = \"True\" ] && break
              else
                echo \"[\${WAITED}s] simulation_results.json pas encore cree...\"
              fi
              kill -0 \$WEBOTS_PID 2>/dev/null || break
            done
            kill \$WEBOTS_PID 2>/dev/null || true
            sleep 2
            pytest $SELECTED_PATHS -v \
              --html=/app/reports/report_ia.html \
              --self-contained-html || true
          "
        continue-on-error: true

      - name: "Récupérer les rapports Docker IA"
        if: always()
        run: docker cp ur-test-ia:/app/reports/. reports_ia/

      - name: "Upload artefacts — pipeline IA (ai_inputs/ + reports_ia/)"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: resultats-ia
          path: |
            ai_inputs/
            reports_ia/